name: Despliegue Neuronal a GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Forzamos Node 24 para evitar la obsolescencia programada de junio 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # O la versión que estés usando localmente

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm' # Astro y GitHub ahora optimizan el caché para pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Instalar, compilar y empaquetar Astro
        uses: withastro/action@v3
        with:
          # ESPECIFICACIÓN CRÍTICA: Cambiamos a pnpm
          package-manager: pnpm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
